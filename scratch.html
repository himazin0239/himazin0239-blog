<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="ja">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Scratchプロフィール - himazin0239</title>

    <style>

        .scratch-container {
            width: 100%px;
            margin: 20px auto;
            background: white;
            border: 2px solid #3a6ea5;
        }

        .scratch-header {
            background: #3a6ea5;
            color: white;
            padding: 5px;
            font-weight: bold;
        }

        .scratch-content {
            padding: 10px;
        }

        .scratch-profile-img {
            float: left;
            margin-right: 10px;
            border: 1px solid #aaa;
        }

        .scratch-box {
            border: 1px solid #aaa;
            margin-top: 10px;
        }

        .scratch-box-title {
            background: #eeeeee;
            padding: 3px;
            font-weight: bold;
        }

        .scratch-box-content {
            padding: 5px;
            white-space: pre-line;
        }

        .scratch-footer {
            font-size: 12px;
            text-align: center;
            padding: 5px;
            color: #666;
        }
    </style>

</head>

<body>

    <div class="scratch-container">
        <div class="scratch-header">Scratchユーザー情報</div>

        <div class="scratch-content">
            <img id="icon" class="scratch-profile-img" src="" width="90" height="90">

            <div id="username"></div>
            <div id="joined"></div>
            <div id="country"></div>

            <div style="clear:both;"></div>

            <div class="scratch-box">
                <div class="scratch-box-title">ステータス</div>
                <div id="status" class="scratch-box-content"></div>
            </div>

            <div class="scratch-box">
                <div class="scratch-box-title">自己紹介</div>
                <div id="bio" class="scratch-box-content"></div>
            </div>
        </div>

        <div class="scratch-footer">
            Scratch API Viewer
        </div>
    </div>

    <script>
        fetch("https://corsproxy.io/https://api.scratch.mit.edu/users/himazin0239/")
            .then(response => {
                if (!response.ok) {
                    throw new Error("HTTPエラー: " + response.status);
                }
                return response.json();
            })
            .then(data => {
                document.getElementById("icon").src = data.profile.images["90x90"];
                document.getElementById("username").innerHTML = "<b>ユーザー名:</b> " + data.username;
                document.getElementById("joined").innerHTML = "<b>参加日:</b> " + data.history.joined;
                document.getElementById("country").innerHTML = "<b>国:</b> " + data.profile.country;
                document.getElementById("status").textContent = data.profile.status;
                document.getElementById("bio").textContent = data.profile.bio;
            })
            .catch(err => {
                alert("エラー: " + err);
            });
    </script>

</body>

</html>
